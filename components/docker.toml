name = 'docker'
from = 'base'

version = '5:29.3.0-1~ubuntu.24.04~noble'

devDependencies = ['apteryx', 'wget']

build = """
install -m 0755 -d /etc/apt/keyrings
curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
chmod a+r /etc/apt/keyrings/docker.asc

echo "Types: deb\\nURIs: https://download.docker.com/linux/ubuntu\\nSuites: $(. /etc/os-release && echo ""${UBUNTU_CODENAME:-$VERSION_CODENAME}"")\\nComponents: stable\\nSigned-By: /etc/apt/keyrings/docker.asc" | tee /etc/apt/sources.list.d/docker.sources

apt-get update

apteryx \
  docker-ce-cli='{{VERSION}}' \
  docker-buildx-plugin \
  docker-compose-plugin
"""

exports = [
  '/usr/bin/docker',
  '/usr/libexec/docker/',
  '/usr/share/zsh/vendor-completions/_docker'
]

[diff]
exclude=[
  "/etc/apt/keyrings/docker.asc",
  "/etc/apt/sources.list.d/docker.sources",
  "/usr/share/bash-completion/**",
  "/usr/share/doc/**",
  "/usr/share/fish/",
  "/usr/share/man/**",
  "/var/lib/apt/**",
  "/var/lib/dpkg/**",
  "/var/log/apt/**",
  "/var/log/dpkg.log"
]
